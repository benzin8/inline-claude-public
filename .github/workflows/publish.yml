name: Publish to npm

# Publishes the package to npm whenever a version tag (v1.2.3) is pushed.
#   git tag v1.0.1 && git push origin v1.0.1
# Requires an NPM_TOKEN secret (Classic → Automation token) in the repo settings.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
